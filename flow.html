<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>フロー | 事業部ルール</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      background: #f0f2f5; color: #333;
    }
    header {
      background: #1F4E79; color: white;
      padding: 20px 40px; display: flex;
      align-items: center; justify-content: space-between;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 { font-size: 22px; letter-spacing: 2px; }
    header a { color: white; text-decoration: none; font-size: 13px; opacity: 0.8; }
    header a:hover { opacity: 1; }
    main { max-width: 1400px; margin: 40px auto; padding: 0 20px; }
    .section-title {
      font-size: 14px; color: #888; letter-spacing: 1px;
      margin-bottom: 16px; border-left: 4px solid #1F4E79; padding-left: 10px;
    }
    .phase-tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
    .phase-tab {
      padding: 8px 20px; border-radius: 20px; font-size: 13px;
      font-weight: bold; cursor: pointer; border: 2px solid #1F4E79;
      color: #1F4E79; background: white; transition: all 0.2s;
    }
    .phase-tab.active, .phase-tab:hover { background: #1F4E79; color: white; }
    .flow-wrap {
      background: white; border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      overflow-x: auto; margin-bottom: 40px;
    }
    .legend { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #666; }
    .legend-box { width: 14px; height: 14px; border-radius: 3px; border: 2px solid; }
    .popup-overlay {
      display: none; position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); z-index: 1000;
      align-items: center; justify-content: center;
    }
    .popup-overlay.active { display: flex; }
    .popup {
      background: white; border-radius: 8px; padding: 28px;
      max-width: 560px; width: 90%;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      position: relative; max-height: 80vh; overflow-y: auto;
    }
    .popup-close {
      position: absolute; top: 12px; right: 16px;
      font-size: 22px; cursor: pointer; color: #888;
    }
    .popup-close:hover { color: #333; }
    .popup h3 {
      font-size: 16px; color: #1F4E79; margin-bottom: 16px;
      padding-bottom: 8px; border-bottom: 2px solid #EBF3FB;
    }
    .popup-row {
      display: grid; grid-template-columns: 80px 1fr;
      gap: 8px; margin-bottom: 12px; font-size: 14px;
    }
    .popup-label { color: #888; font-size: 12px; font-weight: bold; padding-top: 2px; }
    .popup-value { line-height: 1.7; }
    .popup-value.caution { color: #C00000; }
    .popup-empty { color: #ccc; font-size: 13px; text-align: center; padding: 20px; }
    .loading { text-align: center; padding: 40px; color: #888; }
    footer { text-align: center; padding: 30px; font-size: 12px; color: #aaa; }
  </style>
</head>
<body>

  <header>
    <h1>事業部ルール</h1>
    <a href="index.html">← トップに戻る</a>
  </header>

  <div class="popup-overlay" id="popup-overlay">
    <div class="popup">
      <span class="popup-close" id="popup-close">✕</span>
      <h3 id="popup-title"></h3>
      <div id="popup-body"></div>
    </div>
  </div>

  <main>
    <p class="section-title">フロー</p>
    <div style="position:sticky;top:64px;z-index:50;background:#f0f2f5;padding-top:8px;padding-bottom:16px;">
      <div class="legend">
        <div class="legend-item">
          <div class="legend-box" style="border-color:#1F4E79;background:#EBF3FB;"></div>SL
        </div>
        <div class="legend-item">
          <div class="legend-box" style="border-color:#7B6000;background:#FFFDE7;"></div>マーケティング
        </div>
        <div class="legend-item">
          <div class="legend-box" style="border-color:#1B5E20;background:#E8F5E9;"></div>管理部
        </div>
        <div class="legend-item">
          <div class="legend-box" style="border-color:#7B0000;background:#FDE8E8;"></div>在宅パートナー
        </div>
        <div class="legend-item">
          <div class="legend-box" style="border-color:#4A148C;background:#F3E5F5;"></div>経営支援
        </div>
      </div>
      <div class="phase-tabs" id="phase-tabs"></div>
    </div>
    <div class="flow-wrap" id="flow-wrap">
      <div class="loading">データを読み込み中...</div>
    </div>
  </main>

  <footer>事業部ルール &copy; 2024</footer>

  <script src="config.js"></script>
  <script src="common.js"></script>
  <script>
  const LANES = ["SL","マーケティング","管理部","在宅パートナー","経営支援"];
  const LANE_STYLE = {
    "SL":         { header:"#1F4E79", fill:"#EBF3FB", stroke:"#1F4E79", text:"#1F4E79" },
    "マーケティング": { header:"#7B6000", fill:"#FFFDE7", stroke:"#7B6000", text:"#7B6000" },
    "管理部":      { header:"#1B5E20", fill:"#E8F5E9", stroke:"#1B5E20", text:"#1B5E20" },
    "在宅パートナー": { header:"#7B0000", fill:"#FDE8E8", stroke:"#7B0000", text:"#7B0000" },
    "経営支援":    { header:"#4A148C", fill:"#F3E5F5", stroke:"#4A148C", text:"#4A148C" },
  };

  const NODE_W      = 150;
  const NODE_H      = 56;
  const LANE_W      = 200;
  const ROW_H       = 110;
  const HEAD_H      = 44;
  const ARROW_COLOR = "#555";

  // フェーズごとのSL列幅
  const SL_LANE_W_MAP = {
    "1-アポ": 400,
    "2-新規": 800,
    "3-提案": 800,
    "4-ヨミ": 800,
    "5-受注": 400,
  };
  const SL_LANE_W_DEFAULT = 400;
  let currentSL_W = SL_LANE_W_DEFAULT;

  function getLaneX(lanes, idx) {
    let x = 0;
    for (let i = 0; i < idx; i++) {
      x += lanes[i] === "SL" ? currentSL_W : LANE_W;
    }
    return x;
  }
  function getLaneW(lane) {
    return lane === "SL" ? currentSL_W : LANE_W;
  }

  let flowData   = {};
  let detailData = {};

  async function init() {
    const [fRows, dRows] = await Promise.all([
      fetchSheet(CONFIG.SHEETS.フロー),
      fetchSheet(CONFIG.SHEETS.フロー詳細),
    ]);

    dRows.forEach(r => {
      const sid = r["ステップID"];
      if (sid) detailData[sid] = r;
    });

    fRows.forEach(r => {
      const fid = r["フローID"] || "";
      if (!flowData[fid]) flowData[fid] = [];
      flowData[fid].push(r);
    });

    const tabWrap = document.getElementById("phase-tabs");
    Object.keys(flowData).forEach((fid, i) => {
      const btn = document.createElement("button");
      btn.className = "phase-tab" + (i === 0 ? " active" : "");
      btn.textContent = fid;
      btn.addEventListener("click", () => {
        document.querySelectorAll(".phase-tab")
          .forEach(t => t.classList.remove("active"));
        btn.classList.add("active");
        renderFlow(fid);
      });
      tabWrap.appendChild(btn);
    });

    const first = Object.keys(flowData)[0];
    if (first) renderFlow(first);
  }

  function renderFlow(fid) {
    currentSL_W = SL_LANE_W_MAP[fid] || SL_LANE_W_DEFAULT;

    const wrap = document.getElementById("flow-wrap");
    const rows = flowData[fid] || [];

    const stepMap = {};
    rows.forEach(r => {
      const sid = r["ステップID"];
      if (!stepMap[sid]) stepMap[sid] = r;
    });

    const layout    = buildLayout(rows, stepMap);
    const usedLanes = LANES.filter(l => rows.some(r => r["担当"] === l));
    const totalW    = usedLanes.reduce((sum, lane) =>
      sum + (lane === "SL" ? currentSL_W : LANE_W), 0);
    const totalH    = HEAD_H + layout.length * ROW_H + 60;

    const svg = buildSVG(rows, stepMap, layout, usedLanes, totalW, totalH);
    wrap.innerHTML = svg;

    rows.forEach(r => {
      const sid = r["ステップID"];
      const el  = wrap.querySelector(`[data-sid="${sid}"]`);
      if (el) {
        el.style.cursor = "pointer";
        el.addEventListener("click", () => showPopup(sid));
      }
    });
  }

  function buildLayout(rows, stepMap) {
    const rowOf   = {};
    const inCount = {};
    Object.keys(stepMap).forEach(sid => {
      rowOf[sid]   = 0;
      inCount[sid] = 0;
    });

    rows.forEach(r => {
      parseNextSteps(r["次ステップ"]).forEach(n => {
        if (inCount[n] !== undefined) inCount[n]++;
      });
    });

    const starts = Object.keys(stepMap).filter(sid => inCount[sid] === 0);
    if (starts.length === 0) starts.push(Object.keys(stepMap)[0]);
    starts.forEach(sid => { rowOf[sid] = 0; });

    const queue   = [...starts];
    const visited = new Set();

    while (queue.length > 0) {
      const sid = queue.shift();
      if (visited.has(sid)) continue;
      visited.add(sid);

      const r = stepMap[sid];
      if (!r) continue;

      const nexts = parseNextSteps(r["次ステップ"]);
      const myRow = rowOf[sid] || 0;

      nexts.forEach(n => {
        if (!stepMap[n]) return;
        if ((rowOf[n] || 0) < myRow + 1) rowOf[n] = myRow + 1;
        if (!visited.has(n)) queue.push(n);
      });
    }

    // 衝突回避
    const FIXED = ["1-6"];
    let changed = true;
    while (changed) {
      changed = false;
      const used = {};
      Object.keys(rowOf).forEach(sid => {
        if (FIXED.includes(sid)) return;
        const r = stepMap[sid];
        if (!r) return;
        const tanto = r["担当"] || "SL";
        const row   = rowOf[sid];
        const key   = `${tanto}_${row}`;
        if (used[key] && used[key] !== sid) {
          rowOf[sid] = row + 1;
          parseNextSteps(r["次ステップ"]).forEach(n => {
            if (!stepMap[n] || FIXED.includes(n)) return;
            if ((rowOf[n] || 0) <= rowOf[sid]) rowOf[n] = rowOf[sid] + 1;
          });
          changed = true;
        } else {
          used[key] = sid;
        }
      });
    }

    // 1-アポ専用
    const baseRow = rowOf["1-R1a"] !== undefined ? rowOf["1-R1a"] : -1;
    if (baseRow >= 0) {
      if (rowOf["1-3"]   !== undefined) rowOf["1-3"]   = baseRow + 1;
      if (rowOf["1-6"]   !== undefined) rowOf["1-6"]   = baseRow + 2;
      if (rowOf["1-R1b"] !== undefined) rowOf["1-R1b"] = baseRow + 3;
      if (rowOf["1-R2"]  !== undefined) rowOf["1-R2"]  = baseRow + 4;
      if (rowOf["1-3a"]  !== undefined) rowOf["1-3a"]  = baseRow + 5;
      if (rowOf["1-4a"]  !== undefined) rowOf["1-4a"]  = baseRow + 6;
      if (rowOf["1-4b"]  !== undefined) rowOf["1-4b"]  = baseRow + 6;
      if (rowOf["1-5a"]  !== undefined) rowOf["1-5a"]  = baseRow + 7;
      if (rowOf["1-5b"]  !== undefined) rowOf["1-5b"]  = baseRow + 7;
      if (rowOf["2-新規へ"] !== undefined) rowOf["2-新規へ"] = baseRow + 8;
    }

    // 2-新規専用
    const base2 = rowOf["2-1"] !== undefined ? rowOf["2-1"] : -1;
    if (base2 >= 0) {
      if (rowOf["2-2"]       !== undefined) rowOf["2-2"]       = base2 + 1;
      if (rowOf["2-8"]       !== undefined) rowOf["2-8"]       = base2 + 1;
      if (rowOf["2-3-1"]     !== undefined) rowOf["2-3-1"]     = base2 + 2;
      if (rowOf["2-3-2"]     !== undefined) rowOf["2-3-2"]     = base2 + 2;
      if (rowOf["2-3-3"]     !== undefined) rowOf["2-3-3"]     = base2 + 2;
      if (rowOf["2-9"]       !== undefined) rowOf["2-9"]       = base2 + 2;
      if (rowOf["2-4a"]      !== undefined) rowOf["2-4a"]      = base2 + 3;
      if (rowOf["2-4b"]      !== undefined) rowOf["2-4b"]      = base2 + 3;
      if (rowOf["2-4c"]      !== undefined) rowOf["2-4c"]      = base2 + 3;
      if (rowOf["2-10"]      !== undefined) rowOf["2-10"]      = base2 + 3;
      if (rowOf["2-5a"]      !== undefined) rowOf["2-5a"]      = base2 + 4;
      if (rowOf["2-5c"]      !== undefined) rowOf["2-5c"]      = base2 + 4;
      if (rowOf["5-受注へ"]  !== undefined) rowOf["5-受注へ"]  = base2 + 3;
      if (rowOf["2-6a"]      !== undefined) rowOf["2-6a"]      = base2 + 5;
      if (rowOf["2-6b"]      !== undefined) rowOf["2-6b"]      = base2 + 5;
      if (rowOf["2-7a"]      !== undefined) rowOf["2-7a"]      = base2 + 6;
      if (rowOf["2-7b"]      !== undefined) rowOf["2-7b"]      = base2 + 6;
      if (rowOf["3-提案へ"]  !== undefined) rowOf["3-提案へ"]  = base2 + 7;
    }

    // 3-提案専用
    const base3 = rowOf["3-1"] !== undefined ? rowOf["3-1"] : -1;
    if (base3 >= 0) {
      if (rowOf["3-2"]   !== undefined) rowOf["3-2"]   = base3 + 1;
      if (rowOf["3-7"]   !== undefined) rowOf["3-7"]   = base3 + 1;
      if (rowOf["3-3-1"] !== undefined) rowOf["3-3-1"] = base3 + 2;
      if (rowOf["3-3-2"] !== undefined) rowOf["3-3-2"] = base3 + 2;
      if (rowOf["3-3-3"] !== undefined) rowOf["3-3-3"] = base3 + 2;
      if (rowOf["3-8"]   !== undefined) rowOf["3-8"]   = base3 + 2;
      if (rowOf["3-4a"]  !== undefined) rowOf["3-4a"]  = base3 + 3;
      if (rowOf["3-4b"]  !== undefined) rowOf["3-4b"]  = base3 + 3;
      if (rowOf["3-4c"]  !== undefined) rowOf["3-4c"]  = base3 + 3;
      if (rowOf["3-9"]   !== undefined) rowOf["3-9"]   = base3 + 3;
      if (rowOf["3-5a"]  !== undefined) rowOf["3-5a"]  = base3 + 4;
      if (rowOf["3-5c"]  !== undefined) rowOf["3-5c"]  = base3 + 4;
      if (rowOf["5-受注へ"] !== undefined) rowOf["5-受注へ"] = base3 + 4;
      if (rowOf["3-6"]   !== undefined) rowOf["3-6"]   = base3 + 5;
      if (rowOf["4-ヨミへ"] !== undefined) rowOf["4-ヨミへ"] = base3 + 6;
    }

    // 4-ヨミ専用
    const base4 = rowOf["4-1"] !== undefined ? rowOf["4-1"] : -1;
    if (base4 >= 0) {
      if (rowOf["4-2"]      !== undefined) rowOf["4-2"]      = base4 + 1;
      if (rowOf["4-6"]      !== undefined) rowOf["4-6"]      = base4 + 1;
      if (rowOf["4-3-1"]    !== undefined) rowOf["4-3-1"]    = base4 + 2;
      if (rowOf["4-3-2"]    !== undefined) rowOf["4-3-2"]    = base4 + 2;
      if (rowOf["4-3-3"]    !== undefined) rowOf["4-3-3"]    = base4 + 2;
      if (rowOf["4-7"]      !== undefined) rowOf["4-7"]      = base4 + 2;
      if (rowOf["4-4a"]     !== undefined) rowOf["4-4a"]     = base4 + 3;
      if (rowOf["4-4b"]     !== undefined) rowOf["4-4b"]     = base4 + 3;
      if (rowOf["4-4c"]     !== undefined) rowOf["4-4c"]     = base4 + 3;
      if (rowOf["4-8"]      !== undefined) rowOf["4-8"]      = base4 + 3;
      if (rowOf["5-受注へ"] !== undefined) rowOf["5-受注へ"] = base4 + 4;
      if (rowOf["4-5b"]     !== undefined) rowOf["4-5b"]     = base4 + 4;
      if (rowOf["4-5c"]     !== undefined) rowOf["4-5c"]     = base4 + 4;
      if (rowOf["4-1へ"]    !== undefined) rowOf["4-1へ"]    = base4 + 5;
    }

    // 5-受注専用
    const base5 = rowOf["5-1"] !== undefined ? rowOf["5-1"] : -1;
    if (base5 >= 0) {
      if (rowOf["5-2"]   !== undefined) rowOf["5-2"]   = base5 + 1;
      if (rowOf["5-3"]   !== undefined) rowOf["5-3"]   = base5 + 2;
      if (rowOf["5-4"]   !== undefined) rowOf["5-4"]   = base5 + 3;
      if (rowOf["5-R1"]  !== undefined) rowOf["5-R1"]  = base5 + 4;
      if (rowOf["5-4a"]  !== undefined) rowOf["5-4a"]  = base5 + 5;
      if (rowOf["5-5a"]  !== undefined) rowOf["5-5a"]  = base5 + 6;
      if (rowOf["5-5b"]  !== undefined) rowOf["5-5b"]  = base5 + 6;
      if (rowOf["5-6a"]  !== undefined) rowOf["5-6a"]  = base5 + 7;
      if (rowOf["5-6b"]  !== undefined) rowOf["5-6b"]  = base5 + 7;
    }

    // 行番号でグループ化
    const grouped = {};
    Object.entries(rowOf).forEach(([sid, row]) => {
      if (!grouped[row]) grouped[row] = [];
      grouped[row].push(sid);
    });

    return Object.keys(grouped)
      .sort((a, b) => Number(a) - Number(b))
      .map(row => grouped[row]);
  }

  function buildSVG(rows, stepMap, layout, usedLanes, totalW, totalH) {
    let svg = `<svg xmlns="http://www.w3.org/2000/svg"
      width="${totalW}" height="${totalH}"
      style="font-family:Arial,sans-serif;display:block;">
      <defs>
        <marker id="arr" markerWidth="8" markerHeight="6"
          refX="8" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="${ARROW_COLOR}"/>
        </marker>
      </defs>`;

    usedLanes.forEach((lane, i) => {
      const x  = getLaneX(usedLanes, i);
      const w  = getLaneW(lane);
      const st = LANE_STYLE[lane];
      svg += `<rect x="${x}" y="0" width="${w}" height="${HEAD_H}" fill="${st.header}"/>`;
      svg += `<text x="${x + w/2}" y="${HEAD_H/2 + 5}"
        text-anchor="middle" fill="white" font-size="13" font-weight="bold">${lane}</text>`;
      svg += `<rect x="${x}" y="${HEAD_H}" width="${w}"
        height="${totalH - HEAD_H}" fill="${st.fill}" opacity="0.25"/>`;
      if (i > 0) {
        svg += `<line x1="${x}" y1="${HEAD_H}" x2="${x}" y2="${totalH}"
          stroke="#ccc" stroke-width="1" stroke-dasharray="4,4"/>`;
      }
    });

    const posMap = {};
    // SLノードの列位置を固定するマップ
    const SL_COL_MAP = {
      // 2-新規
      "2-3-1": 0, "2-4a": 0, "2-5a": 0, "2-6a": 0, "2-7a": 0, "3-提案へ": 0,
      "2-3-2": 1, "2-4b": 1, "5-受注へ": 1,
      "2-3-3": 2, "2-4c": 2, "2-5c": 2,
      "2-8":   3, "2-9":  3, "2-10": 3,
      // 3-提案
      "3-3-1": 0, "3-4a": 0, "3-5a": 0, "3-6": 0, "4-ヨミへ": 0,
      "3-3-2": 1, "3-4b": 1, "5-受注へ": 1,
      "3-3-3": 2, "3-4c": 2, "3-5c": 2,
      "3-7":   3, "3-8":  3, "3-9":  3,
      // 4-ヨミ
      "4-3-1": 0, "4-4a": 0,"5-受注へ": 0,
      "4-3-2": 1, "4-4b": 1, "4-5b": 1,
      "4-3-3": 2, "4-4c": 2, "4-5c": 2, "4-1へ": 2,
      "4-6":   3, "4-7":  3, "4-8":  3,
    };
    const SL_COL_TOTAL = {
      "2-新規": 4,
      "3-提案": 4,
      "4-ヨミ": 4,
    };

    layout.forEach((rowSids, rowIdx) => {
      const cy = HEAD_H + rowIdx * ROW_H + ROW_H / 2;
      const slNodes = rowSids.filter(sid => stepMap[sid] && stepMap[sid]["担当"] === "SL");

      rowSids.forEach(sid => {
        const r = stepMap[sid];
        if (!r) return;
        const tanto   = r["担当"] || "SL";
        const laneIdx = usedLanes.indexOf(tanto);
        if (laneIdx < 0) return;

        const laneX = getLaneX(usedLanes, laneIdx);
        const laneW = getLaneW(tanto);

        let cx;
        if (tanto === "SL" && sid === "1-6") {
          cx = laneX + laneW * 3 / 4;
        } else if (tanto === "SL" && sid === "2-新規へ") {
          cx = posMap["1-5a"] ? posMap["1-5a"].cx : laneX + currentSL_W / 4;
        } else if (tanto === "SL" && sid === "5-受注へ") {
          // フェーズによって列を変える
          const fid = stepMap[sid] ? stepMap[sid]["フローID"] : "";
          const colIdx = fid === "4-ヨミ" ? 0 : 1;
          const slW = laneW / 4;
          cx = laneX + slW * colIdx + slW / 2;
        } else if (tanto === "SL" && SL_COL_MAP[sid] !== undefined) {
          // 2-新規など列位置が固定されているノード
          const fid      = r["フローID"] || "";
          const colTotal = SL_COL_TOTAL[fid] || 4;
          const colIdx   = SL_COL_MAP[sid];
          const slW      = laneW / colTotal;
          cx = laneX + slW * colIdx + slW / 2;
        } else if (tanto === "SL" && slNodes.length > 1) {
          // その他の複数ノード
          const slIdx = slNodes.indexOf(sid);
          const slW   = laneW / slNodes.length;
          cx = laneX + slW * slIdx + slW / 2;
        } else {
          cx = laneX + laneW / 2;
        }

        posMap[sid] = { cx, cy };
      });
    });

    // 矢印描画
    const drawnArrows = new Set();
    rows.forEach(r => {
      const sid   = r["ステップID"];
      const nexts = parseNextSteps(r["次ステップ"]);
      const conds = parseConditions(r["分岐条件"], nexts);
      const from  = posMap[sid];
      if (!from) return;

      nexts.forEach((nid, idx) => {
        const key = `${sid}->${nid}`;
        if (drawnArrows.has(key)) return;
        drawnArrows.add(key);

        const to = posMap[nid];
        if (!to) return;

        const x1    = from.cx;
        const y1    = from.cy + NODE_H / 2;
        const x2    = to.cx;
        const y2    = to.cy - NODE_H / 2 - 4;
        const label = conds[idx] || "";

        let routeY = y1 + (y2 - y1) * 0.5;
        if (sid === "1-3" && nid === "1-R1b" && posMap["1-6"]) {
          routeY = posMap["1-6"].cy + NODE_H / 2 + 15;
        }

        if (Math.abs(x1 - x2) < 4) {
          svg += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"
            stroke="${ARROW_COLOR}" stroke-width="1.5" marker-end="url(#arr)"/>`;
        } else {
          svg += `<polyline points="${x1},${y1} ${x1},${routeY} ${x2},${routeY} ${x2},${y2}"
            fill="none" stroke="${ARROW_COLOR}" stroke-width="1.5"
            marker-end="url(#arr)"/>`;
        }

        if (label) {
          const lx = x1 + (x2 - x1) * 0.3;
          const ly = routeY - 5;
          const lw = label.length * 7 + 10;
          svg += `<rect x="${lx - lw/2}" y="${ly - 12}" width="${lw}" height="16"
            rx="4" fill="white" stroke="#ddd" stroke-width="1"/>`;
          svg += `<text x="${lx}" y="${ly}"
            text-anchor="middle" font-size="10" fill="#888">${label}</text>`;
        }
      });
    });

    // ノード描画
    const drawnNodes = new Set();
    rows.forEach(r => {
      const sid = r["ステップID"];
      if (drawnNodes.has(sid)) return;
      drawnNodes.add(sid);

      const pos = posMap[sid];
      if (!pos) return;

      const tanto = r["担当"] || "SL";
      const st    = LANE_STYLE[tanto] || LANE_STYLE["SL"];
      const name  = r["ステップ名"] || "";
      const type  = r["分岐タイプ"] || "順次";
      const { cx, cy } = pos;

      const lines  = wrapText(name, 12);
      const nodeH  = Math.max(NODE_H, 20 + lines.length * 16 + 10);
      const x      = cx - NODE_W / 2;
      const y      = cy - nodeH / 2;

      // 次フェーズへのノードは灰色
      const isNextPhase = name.includes("へ");
      const strokeColor = isNextPhase ? "#888" :
        (type === "分岐" || type === "並行＋分岐" || type === "並行")
        ? "#FF8F00" : st.stroke;
      const fillColor = isNextPhase ? "#f5f5f5" : st.fill;
      const textColor = isNextPhase ? "#888" : st.text;
      const strokeDash = type === "並行" ? 'stroke-dasharray="6,3"' : "";

      svg += `<g data-sid="${sid}" style="cursor:pointer">`;
      svg += `<rect x="${x}" y="${y}" width="${NODE_W}" height="${nodeH}"
        rx="6" fill="${fillColor}" stroke="${strokeColor}" stroke-width="2" ${strokeDash}/>`;
      svg += `<text x="${cx}" y="${y + 13}"
        text-anchor="middle" fill="#aaa" font-size="10"
        pointer-events="none">${sid}</text>`;

      lines.forEach((line, i) => {
        svg += `<text x="${cx}" y="${y + 26 + i * 16}"
          text-anchor="middle" fill="${textColor}"
          font-size="12" font-weight="bold"
          pointer-events="none">${line}</text>`;
      });

      svg += `</g>`;
    });

    svg += `</svg>`;
    return svg;
  }

  function parseNextSteps(val) {
    if (!val) return [];
    const TERMINALS = ["終了"];
    return val.split("/")
      .map(s => s.trim().replace(/\s+/g, ""))
      .filter(s => s && !TERMINALS.includes(s));
  }

  function parseConditions(val, nexts) {
    if (!val) return nexts.map(() => "");
    const parts = val.split("/").map(s => s.trim());
    return nexts.map((nid, i) => {
      const matched = parts.find(p => {
        const clean = p
          .replace(/（[^）]*）/g, "")
          .replace(/\([^)]*\)/g, "")
          .replace(/\s/g, "");
        return clean.includes(nid.replace(/\s/g, ""));
      });
      if (matched) return matched.split("→")[0].trim();
      return parts[i] ? parts[i].split("→")[0].trim() : "";
    });
  }

  function wrapText(text, maxLen) {
    if (!text) return [""];
    if (text.includes("\n")) {
      return text.split("\n").map(s => s.trim()).filter(s => s);
    }
    if (text.length <= maxLen) return [text];
    const lines = [];
    let cur = "";
    for (const ch of text) {
      cur += ch;
      if (cur.length >= maxLen) { lines.push(cur); cur = ""; }
    }
    if (cur) lines.push(cur);
    return lines;
  }

  function showPopup(sid) {
    const baseSid = sid.replace(/[a-zA-Z]+$/, "");
    let detail = detailData[sid];
    if (!detail) {
      detail = Object.values(detailData).find(d => {
        const dBase = (d["ステップID"] || "").replace(/[a-zA-Z]+$/, "");
        return dBase === baseSid;
      });
    }

    const overlay = document.getElementById("popup-overlay");
    const title   = document.getElementById("popup-title");
    const body    = document.getElementById("popup-body");

    title.textContent = sid + (detail ? "　" + (detail["ステップ名"] || "") : "");

    if (!detail) {
      body.innerHTML = `<p class="popup-empty">詳細データがありません</p>`;
    } else {
      const fields = [
        { label: "カテゴリ", key: "カテゴリ",  caution: false },
        { label: "種別",     key: "種別",      caution: false },
        { label: "内容",     key: "内容",      caution: false },
        { label: "注意点",   key: "注意点",    caution: true  },
      ];
      body.innerHTML = fields.map(f => {
        const val = (detail[f.key] || "").replace(/\n/g, "<br>");
        if (!val) return "";
        return `
          <div class="popup-row">
            <div class="popup-label">${f.label}</div>
            <div class="popup-value ${f.caution ? "caution" : ""}">${val}</div>
          </div>`;
      }).join("");

      // リンク先がある場合はボタンを追加
      const linkUrl = detail["リンク先"] || "";
      if (linkUrl) {
        body.innerHTML += `
          <div style="margin-top:16px;padding-top:12px;border-top:1px solid #eee;">
            <a href="${linkUrl}" target="_blank"
              style="display:inline-block;padding:8px 16px;
                     background:#1F4E79;color:white;
                     text-decoration:none;border-radius:4px;
                     font-size:13px;font-weight:bold;">
              📄 詳細を見る
            </a>
          </div>`;
      }
    }
    overlay.classList.add("active");
  }

  document.getElementById("popup-close").addEventListener("click", () => {
    document.getElementById("popup-overlay").classList.remove("active");
  });
  document.getElementById("popup-overlay").addEventListener("click", e => {
    if (e.target === e.currentTarget)
      document.getElementById("popup-overlay").classList.remove("active");
  });

  init().then(() => {
    if (window.location.hash) {
      const phase = decodeURIComponent(window.location.hash.slice(1));
      const tabs  = document.querySelectorAll(".phase-tab");
      tabs.forEach(tab => {
        if (tab.textContent === phase) {
          tab.click();
        }
      });
    }
  });

  </script>
</body>
</html>
